<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - FEEDER FIX MAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/qr-scanner/qr-scanner.umd.min.js"></script>
    
    <style>
        :root {
            --ig-blue: #0095f6;
            --bg-color: #f7f5f0; 
            --text-main: #2d3748;
            --text-sub: #9ca3af;
            --border-color: #e5e7eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 15px 10px; color: var(--text-main); transition: background-color 0.2s; }
        
        body.scan-success { background-color: #00E676 !important; }

        /* ปรับขนาดแอปเป็น 200px ตามที่ต้องการ */
        .app-container { max-width: 200px; width: 100%; }
        .top-card { background: #ffffff; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; border-top: 5px solid var(--ig-blue); }
        
        /* ปรับขนาดฟอนต์ให้เล็กลงเพื่อให้พอดีกับความกว้าง 200px */
        h1 { font-size: 16px; font-weight: 700; color: var(--ig-blue); margin-bottom: 5px; }
        p { font-size: 12px; color: var(--text-sub); margin-bottom: 12px; line-height: 1.4; }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            border: 2px dashed var(--border-color);
            aspect-ratio: 3 / 4; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qr-video { width: 100%; height: 100%; object-fit: cover; }
        
        .btn { border: none; border-radius: 8px; width: 100%; padding: 10px; font-size: 12px; font-weight: 600; font-family: 'Kanit', sans-serif; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .btn:active { transform: scale(0.98); }
        
        .btn-cancel { background: #f3f4f6; color: var(--text-main); }
        .btn-cancel:active { background: #e5e7eb; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-card">
            <h1>📷 สแกน QR CODE</h1>
            <p>ระบบจะซูมภาพ 3x อัตโนมัติ</p>
            
            <div class="video-wrapper">
                <video id="qr-video"></video>
            </div>
            
            <button type="button" id="cancelBtn" class="btn btn-cancel">กลับไปหน้าหลัก</button>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzR_IBCyKZ71fSv9KCJEy25R-s70uk4I1HcwcNA1kcwCBHICBv-yIsHrMFMGkeJCEVD/exec";
        
        let qrScanner;
        let videoTrack = null;
        
        const videoElem = document.getElementById('qr-video');

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {
                console.log("Audio not supported");
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            qrScanner = new QrScanner(
                videoElem,
                result => {
                    qrScanner.stop(); 
                    if (navigator.vibrate) navigator.vibrate(200);
                    playBeep();
                    document.body.classList.add('scan-success');
                    setTimeout(() => { document.body.classList.remove('scan-success'); }, 300);
                    onCodeScanned(result.data);
                },
                {
                    highlightScanRegion: true,
                    highlightCodeOutline: true,
                    returnDetailedScanResult: true,
                    preferredCamera: 'environment'
                }
            );

            qrScanner.start().then(() => {
                setTimeout(() => {
                    const stream = videoElem.srcObject;
                    if (stream) {
                        videoTrack = stream.getVideoTracks()[0];
                        
                        // บังคับซูม 3x อัตโนมัติเมื่อเปิดกล้อง
                        const capabilities = videoTrack.getCapabilities();
                        if (capabilities && 'zoom' in capabilities) {
                            const maxZoom = capabilities.zoom.max || 1;
                            // เลือกค่าซูมที่ 3x หรือค่าสูงสุดที่กล้องทำได้ (ป้องกันการขอซูมเกินจริง)
                            const targetZoom = Math.min(3, maxZoom); 
                            
                            videoTrack.applyConstraints({
                                advanced: [{ zoom: targetZoom }]
                            }).catch(err => {
                                console.error("เปลี่ยนระยะซูมล้มเหลว:", err);
                            });
                        }
                    }
                }, 500);
            }).catch((err) => {
                Swal.fire({
                    icon: 'error',
                    title: 'เปิดกล้องไม่ได้',
                    text: 'กรุณาตรวจสอบสิทธิ์การใช้กล้อง'
                });
            });
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            if (qrScanner) qrScanner.stop();
            window.location.href = GAS_WEB_APP_URL;
        });
        
        function onCodeScanned(data) {
            Swal.fire({ 
                icon: 'success', 
                title: 'อ่าน Tag สำเร็จ!', 
                text: 'กำลังพากลับไปยังระบบบันทึก...',
                timer: 1500, 
                showConfirmButton: false,
                allowOutsideClick: false
            });

            setTimeout(() => {
                window.location.href = GAS_WEB_APP_URL + "?tag=" + encodeURIComponent(data.trim());
            }, 1500);
        }
    </script>
</body>
</html>
