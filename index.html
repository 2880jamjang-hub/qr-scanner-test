<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - FEEDER FIX MAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://unpkg.com/qr-scanner/qr-scanner.umd.min.js"></script>
    
    <style>
        :root {
            --ig-blue: #0095f6;
            --bg-color: #f7f5f0; 
            --text-main: #2d3748;
            --text-sub: #9ca3af;
            --border-color: #e5e7eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 15px 10px; color: var(--text-main); }
        .app-container { max-width: 400px; width: 100%; }
        .top-card { background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; border-top: 5px solid var(--ig-blue); }
        h1 { font-size: 20px; font-weight: 700; color: var(--ig-blue); margin-bottom: 5px; }
        p { font-size: 14px; color: var(--text-sub); margin-bottom: 20px; }
        
        /* ปรับแต่งสำหรับ qr-scanner โดยเฉพาะ */
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            border: 2px dashed var(--border-color);
            aspect-ratio: 1 / 1; /* บังคับกรอบให้เป็นสี่เหลี่ยมจัตุรัส */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qr-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ทำให้ภาพจากกล้องเต็มกรอบพอดี ไม่เบี้ยว */
        }
        
        .btn-cancel { background: #f3f4f6; color: var(--text-main); border: none; border-radius: 8px; width: 100%; padding: 12px; font-size: 14px; font-weight: 600; font-family: 'Kanit', sans-serif; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-cancel:active { background: #e5e7eb; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-card">
            <h1>📷 สแกน QR CODE</h1>
            <p>สแกน QR บนอุปกรณ์เพื่อบันทึกข้อมูล</p>
            
            <div class="video-wrapper">
                <video id="qr-video"></video>
            </div>
            
            <button type="button" id="cancelBtn" class="btn-cancel">กลับไปหน้าหลัก</button>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzR_IBCyKZ71fSv9KCJEy25R-s70uk4I1HcwcNA1kcwCBHICBv-yIsHrMFMGkeJCEVD/exec";
        
        let qrScanner;
        const videoElem = document.getElementById('qr-video');

        window.addEventListener('DOMContentLoaded', () => {
            // ตั้งค่า qr-scanner
            qrScanner = new QrScanner(
                videoElem,
                result => {
                    // เมื่อสแกนเจอ QR
                    qrScanner.stop(); // หยุดกล้องทันที
                    onCodeScanned(result.data);
                },
                {
                    // ตั้งค่าให้มีเส้นกรอบสีเหลืองเด้งขึ้นมาจับที่ QR Code เพื่อความแม่นยำ
                    highlightScanRegion: true,
                    highlightCodeOutline: true,
                    returnDetailedScanResult: true
                }
            );

            // เริ่มเปิดกล้อง
            qrScanner.start().catch((err) => {
                Swal.fire({
                    icon: 'error',
                    title: 'เปิดกล้องไม่ได้',
                    text: 'กรุณาตรวจสอบสิทธิ์การใช้กล้อง หรือลองเปิดผ่านเบราว์เซอร์ Chrome/Safari โดยตรง'
                }).then(() => {
                    window.location.href = GAS_WEB_APP_URL;
                });
            });
        });
        
        document.getElementById('cancelBtn').addEventListener('click', () => {
            if (qrScanner) {
                qrScanner.stop();
            }
            window.location.href = GAS_WEB_APP_URL;
        });
        
        function onCodeScanned(data) {
            Swal.fire({ 
                icon: 'success', 
                title: 'อ่าน Tag สำเร็จ!', 
                text: 'กำลังพากลับไปยังระบบบันทึก...',
                timer: 1500, 
                showConfirmButton: false,
                allowOutsideClick: false
            });

            setTimeout(() => {
                window.location.href = GAS_WEB_APP_URL + "?tag=" + encodeURIComponent(data.trim());
            }, 1500);
        }
    </script>
</body>
</html>
