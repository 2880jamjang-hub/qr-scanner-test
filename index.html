<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - FEEDER FIX MAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/qr-scanner/qr-scanner.umd.min.js"></script>
    
    <style>
        :root {
            --ig-blue: #0095f6;
            --bg-color: #f7f5f0; 
            --text-main: #2d3748;
            --text-sub: #9ca3af;
            --border-color: #e5e7eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 15px 10px; color: var(--text-main); transition: background-color 0.2s; }
        
        body.scan-success { background-color: #00E676 !important; }

        .app-container { max-width: 400px; width: 100%; }
        .top-card { background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; border-top: 5px solid var(--ig-blue); }
        h1 { font-size: 20px; font-weight: 700; color: var(--ig-blue); margin-bottom: 5px; }
        p { font-size: 14px; color: var(--text-sub); margin-bottom: 15px; }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            border: 2px dashed var(--border-color);
            aspect-ratio: 3 / 4; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qr-video { width: 100%; height: 100%; object-fit: cover; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        
        .btn { border: none; border-radius: 8px; width: 100%; padding: 12px; font-size: 14px; font-weight: 600; font-family: 'Kanit', sans-serif; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .btn:active { transform: scale(0.98); }
        
        .btn-action { background: #e0f2fe; color: var(--ig-blue); flex: 1; border: 1px solid #bae6fd;}
        .btn-action:active { background: #bae6fd; }
        
        .btn-cancel { background: #f3f4f6; color: var(--text-main); }
        .btn-cancel:active { background: #e5e7eb; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-card">
            <h1>📷 สแกน QR CODE</h1>
            <p>ถอยกล้องห่างนิดนึง แล้วกดปุ่มซูมเพื่อสแกน</p>
            
            <div class="video-wrapper">
                <video id="qr-video"></video>
            </div>
            
            <div class="controls">
                <button type="button" id="zoomBtn" class="btn btn-action">🔍 ซูม 2.5x</button>
                <button type="button" id="torchBtn" class="btn btn-action">🔦 เปิดไฟฉาย</button>
            </div>
            
            <button type="button" id="cancelBtn" class="btn btn-cancel">กลับไปหน้าหลัก</button>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzR_IBCyKZ71fSv9KCJEy25R-s70uk4I1HcwcNA1kcwCBHICBv-yIsHrMFMGkeJCEVD/exec";
        
        let qrScanner;
        let currentZoom = 1;
        let videoTrack = null;
        const videoElem = document.getElementById('qr-video');

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {
                console.log("Audio not supported");
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            qrScanner = new QrScanner(
                videoElem,
                result => {
                    qrScanner.stop(); 
                    if (navigator.vibrate) navigator.vibrate(200);
                    playBeep();
                    document.body.classList.add('scan-success');
                    setTimeout(() => { document.body.classList.remove('scan-success'); }, 300);
                    onCodeScanned(result.data);
                },
                {
                    highlightScanRegion: true,
                    highlightCodeOutline: true,
                    returnDetailedScanResult: true,
                    preferredCamera: 'environment'
                }
            );

            qrScanner.start().then(() => {
                setTimeout(() => {
                    const stream = videoElem.srcObject;
                    if (stream) {
                        videoTrack = stream.getVideoTracks()[0];
                    }
                }, 500);
            }).catch((err) => {
                Swal.fire({
                    icon: 'error',
                    title: 'เปิดกล้องไม่ได้',
                    text: 'กรุณาตรวจสอบสิทธิ์การใช้กล้อง'
                });
            });
        });

        // ฟังก์ชันควบคุมการซูมด้วยปุ่มกด
        document.getElementById('zoomBtn').addEventListener('click', () => {
            if (!videoTrack) {
                Swal.fire('ไม่พร้อม', 'กล้องยังไม่พร้อมใช้งาน', 'info');
                return;
            }
            
            const capabilities = videoTrack.getCapabilities();
            if (capabilities && 'zoom' in capabilities) {
                const maxZoom = capabilities.zoom.max || 1;
                
                // สลับค่าระหว่าง 1x และ 2.5x (หรือค่าสูงสุดที่กล้องทำได้)
                if (currentZoom === 1) {
                    currentZoom = Math.min(2.5, maxZoom);
                } else {
                    currentZoom = 1;
                }
                
                videoTrack.applyConstraints({
                    advanced: [{ zoom: currentZoom }]
                }).then(() => {
                    document.getElementById('zoomBtn').innerHTML = currentZoom > 1 ? "🔍 ลดซูม (1x)" : "🔍 ซูม 2.5x";
                }).catch(err => {
                    console.error(err);
                });
            } else {
                Swal.fire('ไม่รองรับ', 'มือถือรุ่นนี้ไม่รองรับคำสั่งซูมผ่านเว็บไซต์', 'warning');
            }
        });

        // ฟังก์ชันควบคุมไฟฉาย
        document.getElementById('torchBtn').addEventListener('click', () => {
            if(qrScanner) {
                qrScanner.hasFlash().then(hasFlash => {
                    if(hasFlash) {
                        qrScanner.toggleFlash();
                    } else {
                        Swal.fire('ไม่รองรับ', 'มือถือรุ่นนี้ไม่รองรับการเปิดไฟฉายผ่านเว็บไซต์', 'warning');
                    }
                });
            }
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            if (qrScanner) qrScanner.stop();
            window.location.href = GAS_WEB_APP_URL;
        });
        
        function onCodeScanned(data) {
            Swal.fire({ 
                icon: 'success', 
                title: 'อ่าน Tag สำเร็จ!', 
                text: 'กำลังพากลับไปยังระบบบันทึก...',
                timer: 1500, 
                showConfirmButton: false,
                allowOutsideClick: false
            });

            setTimeout(() => {
                window.location.href = GAS_WEB_APP_URL + "?tag=" + encodeURIComponent(data.trim());
            }, 1500);
        }
    </script>
</body>
</html>
