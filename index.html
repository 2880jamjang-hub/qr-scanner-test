<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - FEEDER FIX MAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --ig-blue: #0095f6;
            --bg-color: #f7f5f0; 
            --text-main: #2d3748;
            --text-sub: #9ca3af;
            --border-color: #e5e7eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 15px 10px; color: var(--text-main); }
        .app-container { max-width: 400px; width: 100%; }
        .top-card { background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; border-top: 5px solid var(--ig-blue); }
        h1 { font-size: 20px; font-weight: 700; color: var(--ig-blue); margin-bottom: 5px; }
        p { font-size: 14px; color: var(--text-sub); margin-bottom: 20px; }
        
        /* ปรับกรอบสแกนให้เป็นสี่เหลี่ยมจัตุรัสรับกับ QR Code */
        #reader { width: 100%; border: 2px dashed var(--border-color); border-radius: 12px; overflow: hidden; margin-bottom: 15px; background: #000; }
        
        .btn-cancel { background: #f3f4f6; color: var(--text-main); border: none; border-radius: 8px; width: 100%; padding: 12px; font-size: 14px; font-weight: 600; font-family: 'Kanit', sans-serif; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-cancel:active { background: #e5e7eb; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-card">
            <h1>📷 สแกน QR CODE</h1>
            <p>สแกน QR บนอุปกรณ์เพื่อบันทึกข้อมูล</p>
            
            <div id="reader"></div>
            
            <button type="button" id="cancelBtn" class="btn-cancel">กลับไปหน้าหลัก</button>
        </div>
    </div>

    <script>
        // ลิงก์ Web App หลักของ Google Apps Script
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzR_IBCyKZ71fSv9KCJEy25R-s70uk4I1HcwcNA1kcwCBHICBv-yIsHrMFMGkeJCEVD/exec";
        
        let html5QrCode;

        window.addEventListener('DOMContentLoaded', () => {
            // ประกาศใช้งาน Scanner โดยกำหนดให้รองรับเฉพาะ QR_CODE เท่านั้น
            html5QrCode = new Html5Qrcode("reader", {
                formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
            });
            startScanner();
        });
        
        // ฟังก์ชันสำหรับปุ่ม "กลับไปหน้าหลัก"
        document.getElementById('cancelBtn').addEventListener('click', () => {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    window.location.href = GAS_WEB_APP_URL; 
                }).catch(err => {
                    window.location.href = GAS_WEB_APP_URL;
                });
            } else {
                window.location.href = GAS_WEB_APP_URL;
            }
        });

        function startScanner() {
            // ปรับกรอบสแกนเป็นสี่เหลี่ยมจัตุรัส (250x250)
            const config = { 
                fps: 15, // เพิ่ม Frame rate เล็กน้อยให้จับภาพได้ลื่นขึ้น
                qrbox: { width: 250, height: 250 } 
            };

            // บังคับการตั้งค่ากล้องให้ใช้กล้องหลัง และพยายามดันความละเอียดภาพให้ชัดขึ้น
            const cameraConstraints = { 
                facingMode: "environment",
                width: { ideal: 1280 },  // ขอความละเอียด HD เป็นอย่างน้อย
                height: { ideal: 720 }
            };

            html5QrCode.start(
                cameraConstraints,
                config,
                (decodedText, decodedResult) => {
                    // เมื่อสแกนเจอ QR Code
                    if (html5QrCode.isScanning) {
                        html5QrCode.stop().then(() => {
                            onCodeScanned(decodedText);
                        });
                    }
                },
                (errorMessage) => {
                    // ซ่อน Error ระหว่างที่กล้องกำลังพยายามโฟกัส
                }
            ).catch((err) => {
                Swal.fire({
                    icon: 'error',
                    title: 'เปิดกล้องไม่ได้',
                    text: 'กรุณาอนุญาตให้สิทธิ์ใช้งานกล้องในเบราว์เซอร์ของคุณ'
                }).then(() => {
                    window.location.href = GAS_WEB_APP_URL;
                });
            });
        }
        
        function onCodeScanned(data) {
            Swal.fire({ 
                icon: 'success', 
                title: 'อ่าน Tag สำเร็จ!', 
                text: 'กำลังพากลับไปยังระบบบันทึก...',
                timer: 1500, 
                showConfirmButton: false,
                allowOutsideClick: false
            });

            // รอ 1.5 วิ แล้วพาเด้งกลับไปที่ GAS
            setTimeout(() => {
                window.location.href = GAS_WEB_APP_URL + "?tag=" + encodeURIComponent(data.trim());
            }, 1500);
        }
    </script>
</body>
</html>
