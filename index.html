<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - FEEDER FIX MAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/qr-scanner/qr-scanner.umd.min.js"></script>
    
    <style>
        :root {
            --ig-blue: #0095f6;
            --bg-color: #f7f5f0; 
            --text-main: #2d3748;
            --text-sub: #9ca3af;
            --border-color: #e5e7eb;
            --flash-color: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 15px 10px; color: var(--text-main); }
        .app-container { max-width: 400px; width: 100%; }
        .top-card { background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; border-top: 5px solid var(--ig-blue); }
        h1 { font-size: 20px; font-weight: 700; color: var(--ig-blue); margin-bottom: 5px; }
        p { font-size: 14px; color: var(--text-sub); margin-bottom: 15px; }
        
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            border: 2px dashed var(--border-color);
            aspect-ratio: 1 / 1; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qr-video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* ปุ่มเครื่องมือ */
        .tools-group { display: flex; gap: 10px; margin-bottom: 10px; }
        
        .btn { border: none; border-radius: 8px; width: 100%; padding: 12px; font-size: 14px; font-weight: 600; font-family: 'Kanit', sans-serif; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .btn:active { transform: scale(0.98); }
        
        .btn-flash { background: #fffbeb; color: var(--flash-color); border: 2px solid #fde68a; }
        .btn-flash.active { background: var(--flash-color); color: #fff; border-color: var(--flash-color); }
        .btn-flash.hidden { display: none; }
        
        .btn-cancel { background: #f3f4f6; color: var(--text-main); }
        .btn-cancel:active { background: #e5e7eb; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-card">
            <h1>📷 สแกน QR CODE</h1>
            <p>สแกน QR บนอุปกรณ์เพื่อบันทึกข้อมูล</p>
            
            <div class="video-wrapper">
                <video id="qr-video"></video>
            </div>
            
            <div class="tools-group">
                <button type="button" id="flashBtn" class="btn btn-flash hidden">🔦 เปิดไฟฉาย</button>
            </div>
            <button type="button" id="cancelBtn" class="btn btn-cancel">กลับไปหน้าหลัก</button>
        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzR_IBCyKZ71fSv9KCJEy25R-s70uk4I1HcwcNA1kcwCBHICBv-yIsHrMFMGkeJCEVD/exec";
        
        let qrScanner;
        let isFlashOn = false;
        const videoElem = document.getElementById('qr-video');
        const flashBtn = document.getElementById('flashBtn');

        // ฟังก์ชันสร้างเสียง Beep โดยไม่ต้องใช้ไฟล์ MP3 (โหลดเร็ว 100%)
        function playBeep() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.type = 'sine'; // เสียงติ๊ดแบบนุ่มนวล
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.15); // ความยาวเสียง 0.15 วินาที
            } catch (e) {
                console.log("Audio not supported");
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            qrScanner = new QrScanner(
                videoElem,
                result => {
                    qrScanner.stop(); 
                    // 1. สั่นมือถือ 200 มิลลิวินาที (ถ้ามือถือรองรับ)
                    if (navigator.vibrate) navigator.vibrate(200);
                    // 2. เล่นเสียง Beep
                    playBeep();
                    // 3. ส่งข้อมูลไปทำงานต่อ
                    onCodeScanned(result.data);
                },
                {
                    highlightScanRegion: true,
                    highlightCodeOutline: true,
                    returnDetailedScanResult: true
                }
            );

            qrScanner.start().then(() => {
                // เช็คว่ามือถือมีแฟลชให้เปิดหรือไม่ ถ้ามีให้โชว์ปุ่มเปิดไฟฉาย
                qrScanner.hasFlash().then(hasFlash => {
                    if (hasFlash) flashBtn.classList.remove('hidden');
                });
            }).catch((err) => {
                Swal.fire({
                    icon: 'error',
                    title: 'เปิดกล้องไม่ได้',
                    text: 'กรุณาตรวจสอบสิทธิ์การใช้กล้อง หรือลองเปิดผ่านเบราว์เซอร์หลัก'
                }).then(() => {
                    window.location.href = GAS_WEB_APP_URL;
                });
            });
        });
        
        // ระบบเปิด/ปิด ไฟฉาย
        flashBtn.addEventListener('click', () => {
            if (qrScanner) {
                qrScanner.toggleFlash().then(() => {
                    isFlashOn = !isFlashOn;
                    if (isFlashOn) {
                        flashBtn.classList.add('active');
                        flashBtn.innerHTML = "🔦 ปิดไฟฉาย";
                    } else {
                        flashBtn.classList.remove('active');
                        flashBtn.innerHTML = "🔦 เปิดไฟฉาย";
                    }
                });
            }
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            if (qrScanner) qrScanner.stop();
            window.location.href = GAS_WEB_APP_URL;
        });
        
        function onCodeScanned(data) {
            Swal.fire({ 
                icon: 'success', 
                title: 'อ่าน Tag สำเร็จ!', 
                text: 'กำลังพากลับไปยังระบบบันทึก...',
                timer: 1500, 
                showConfirmButton: false,
                allowOutsideClick: false
            });

            setTimeout(() => {
                window.location.href = GAS_WEB_APP_URL + "?tag=" + encodeURIComponent(data.trim());
            }, 1500);
        }
    </script>
</body>
</html>
