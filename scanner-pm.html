<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - PM Record</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://unpkg.com/qr-scanner/qr-scanner.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #e6edf5;
            --clay-blue: #BCE2FC;
            --text-main: #61738c;
            --border-color: #c5d0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* เพิ่ม transition ให้จอกะพริบสีเขียวนุ่มนวลขึ้น */
        body { font-family: 'Kanit', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 15px 10px; color: var(--text-main); transition: background-color 0.2s; }
        
        /* คลาสสำหรับทำให้จอกะพริบสีเขียวตอนสแกนติด */
        body.scan-success { background-color: #00E676 !important; }

        .app-container { max-width: 400px; width: 100%; }
        .top-card { background: #ffffff; border-radius: 25px; padding: 25px; box-shadow: 10px 10px 20px #c5d0e0, -10px -10px 20px #ffffff; text-align: center; }
        h1 { font-size: 22px; font-weight: 600; color: #5A85A3; margin-bottom: 5px; }
        p { font-size: 14px; color: #8397af; margin-bottom: 20px; }
        
        /* ปรับแต่งกรอบวิดีโอสำหรับ qr-scanner ให้เป็นสี่เหลี่ยมจัตุรัส */
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            margin-bottom: 20px;
            border: 2px dashed var(--border-color);
            aspect-ratio: 1 / 1; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qr-video { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-cancel { background-color: var(--clay-blue); color: #5A85A3; box-shadow: 6px 6px 12px #A6C8E0, -6px -6px 12px #D2FCFF; border: none; border-radius: 20px; width: 100%; padding: 14px; font-size: 15px; font-weight: 600; font-family: 'Kanit', sans-serif; cursor: pointer; transition: 0.2s; }
        .btn-cancel:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-card">
            <h1>📷 สแกนข้อมูล PM</h1>
            <p>สแกน QR Code ของ Feeder</p>
            
            <div class="video-wrapper">
                <video id="qr-video"></video>
            </div>
            
            <button type="button" id="cancelBtn" class="btn-cancel">กลับไปหน้าหลัก</button>
        </div>
    </div>

    <script>
        // ⚠️ ลิงก์ Web App ของโปรเจกต์ PM Record 
        const GAS_PM_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbycnmviYXG6PBE2kfYsmseRHdxdXImnU5zFaA-Y-LJDvMAqgjtts1GjtzICstZqyjRvBw/exec"; 
        
        let qrScanner;
        const videoElem = document.getElementById('qr-video');

        // ฟังก์ชันสร้างเสียง Beep
        function playBeep() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {
                console.log("Audio not supported");
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            qrScanner = new QrScanner(
                videoElem,
                result => {
                    // เมื่อสแกนเจอ QR Code
                    qrScanner.stop(); 
                    
                    // 1. ลองสั่งสั่น (สำหรับ Android ที่รองรับ)
                    if (navigator.vibrate) navigator.vibrate(200);
                    
                    // 2. เล่นเสียง Beep
                    playBeep();
                    
                    // 3. กะพริบหน้าจอสีเขียว
                    document.body.classList.add('scan-success');
                    setTimeout(() => {
                        document.body.classList.remove('scan-success');
                    }, 300);

                    // 4. ส่งข้อมูล
                    onCodeScanned(result.data);
                },
                {
                    highlightScanRegion: true,
                    highlightCodeOutline: true,
                    returnDetailedScanResult: true
                }
            );

            // เริ่มเปิดกล้อง
            qrScanner.start().catch((err) => {
                Swal.fire({
                    icon: 'error',
                    title: 'เปิดกล้องไม่ได้',
                    text: 'กรุณาตรวจสอบสิทธิ์การใช้กล้อง'
                }).then(() => {
                    window.location.href = GAS_PM_WEB_APP_URL;
                });
            });
        });

        // ปุ่มยกเลิก/กลับไปหน้าหลัก
        document.getElementById('cancelBtn').addEventListener('click', () => {
            if (qrScanner) qrScanner.stop();
            window.location.href = GAS_PM_WEB_APP_URL;
        });
        
        // ฟังก์ชันส่งค่าพารามิเตอร์กลับไปที่ GAS
        function onCodeScanned(data) {
            Swal.fire({ 
                icon: 'success', 
                title: 'สำเร็จ!', 
                text: 'กำลังพากลับ...', 
                timer: 1500, 
                showConfirmButton: false, 
                allowOutsideClick: false 
            });

            setTimeout(() => {
                window.location.href = GAS_PM_WEB_APP_URL + "?tag=" + encodeURIComponent(data.trim());
            }, 1500);
        }
    </script>
</body>
</html>
